<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Asem El-Sayed Ammar — Senior Mobile Engineer specializing in Flutter & Android. 4+ years building high-performance cross-platform apps.">
  <meta name="keywords" content="Flutter Developer, Mobile Engineer, Android, Dart, Clean Architecture, BLoC, Cairo Egypt">
  <meta name="author" content="Asem El-Sayed Ammar">

  <!-- Open Graph -->
  <meta property="og:title" content="Asem El-Sayed Ammar | Senior Mobile Engineer">
  <meta property="og:description" content="Senior Mobile Engineer with 4+ years building high-performance Flutter & Android applications.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Asem Ammar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Asem El-Sayed Ammar | Senior Mobile Engineer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts Preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    body {
      background-color: #0A0E1A;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0A0E1A;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen .logo-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #00B4D8;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0, 180, 216, 0.2);
      border-top-color: #00B4D8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="logo-text">ASEM AMMAR</div>
    <div class="loader"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      const screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('hidden');
        setTimeout(() => screen.remove(), 600);
      }
    });
  </script>
</body>
</html>
